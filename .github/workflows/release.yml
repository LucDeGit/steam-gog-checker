name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' chromium/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Package Chromium
        run: |
          cd chromium
          zip -r ../steam-gog-checker-chromium-v${{ steps.version.outputs.version }}.zip . -x "*.DS_Store"

      - name: Package Firefox
        run: |
          cd firefox
          zip -r ../steam-gog-checker-firefox-v${{ steps.version.outputs.version }}.zip . -x "*.DS_Store"
          cp ../steam-gog-checker-firefox-v${{ steps.version.outputs.version }}.zip \
             ../steam-gog-checker-firefox-v${{ steps.version.outputs.version }}.xpi

      - name: Upload artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            steam-gog-checker-chromium-*.zip
            steam-gog-checker-firefox-*.zip
            steam-gog-checker-firefox-*.xpi

      - name: Create Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            steam-gog-checker-chromium-v${{ steps.version.outputs.version }}.zip
            steam-gog-checker-firefox-v${{ steps.version.outputs.version }}.zip
            steam-gog-checker-firefox-v${{ steps.version.outputs.version }}.xpi
          body: |
            ## Install

            **Chrome / Edge / Brave / Opera / Vivaldi**: download `steam-gog-checker-chromium-v${{ steps.version.outputs.version }}.zip`, unzip somewhere permanent, open `chrome://extensions/`, enable Developer mode, click "Load unpacked", and select the folder.

            **Firefox (temporary)**: download the `.zip`, unzip, open `about:debugging#/runtime/this-firefox`, click "Load Temporary Add-on", and select `manifest.json`.

            **Firefox (permanent)**: the `.xpi` is the same content, renamed. Sign it via Mozilla (free unlisted mode) or install in Firefox Developer Edition with `xpinstall.signatures.required = false`.

            → **Detailed step-by-step guide: [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md)**

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for the security audit and technical details.

            **Chrome / Edge / Brave**: download `steam-gog-checker-chromium-v${{ steps.version.outputs.version }}.zip`, unzip, open `chrome://extensions/` (or `edge://extensions/`), enable Developer mode, click "Load unpacked", and select the folder.

            **Firefox (temporary)**: download the `.zip`, unzip, open `about:debugging#/runtime/this-firefox`, click "Load Temporary Add-on", and select `manifest.json`.

            **Firefox (permanent)**: the `.xpi` file is the same content, renamed. Sign it via Mozilla (developer account, unlisted mode) or install it in Firefox Developer Edition with `xpinstall.signatures.required = false`.

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for details and the security audit.
